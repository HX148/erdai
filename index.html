<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="三人行 - 创新的三人联机游戏平台，支持多种游戏模式，随时随地和朋友一起玩！">
  <meta name="keywords" content="联机游戏, 三人游戏, 网页游戏, 多人游戏, 休闲游戏">
  <meta name="author" content="三人行团队">
  <meta name="theme-color" content="#6366F1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <meta property="og:title" content="三人行 - 三人联机游戏平台">
  <meta property="og:description" content="创新的三人联机游戏平台，随时随地和朋友一起玩！">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  
  <title>三人行 - 三人联机游戏平台</title>
  
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366F1',
            secondary: '#EC4899',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            background: '#FCF8EE',
            dark: '#0F0F0F'
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'bounce-in': 'bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)',
            'pulse-slow': 'pulse 2s infinite',
            'spin-slow': 'spin 3s linear infinite'
          }
        }
      }
    }
  </script>
  
  <style>
    :root {
      --primary: #6366F1;
      --secondary: #EC4899;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --background: #FCF8EE;
      --dark: #0F0F0F;
    }
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .dark body,
    body.dark-mode {
      background: var(--dark);
      color: white;
    }
    
    .dark-mode .card {
      background: #1a1a1a;
      border-color: #333;
    }
    
    .dark-mode .text-gray-600,
    .dark-mode .text-gray-700 {
      color: #ccc;
    }
    
    .dark-mode .bg-white {
      background-color: #1a1a1a;
    }
    
    .dark-mode .bg-gray-50 {
      background-color: #262626;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    
    @media (max-width: 768px) {
      .text-4xl {
        font-size: 2.5rem;
      }
      
      .text-3xl {
        font-size: 2rem;
      }
      
      button, .btn {
        min-height: 48px;
        touch-action: manipulation;
      }
      
      .p-6 {
        padding: 1rem;
      }
    }
    
    @media (min-width: 768px) and (max-width: 1024px) {
      .container {
        max-width: 90%;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    .keyboard-nav :focus {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen flex flex-col">
    <section id="home-page" class="flex-1 fade-in">
      <header class="py-6 px-4">
        <div class="container mx-auto text-center">
          <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-primary via-purple-500 to-secondary bg-clip-text text-transparent">
            🎮 三人行
          </h1>
          <p class="text-lg mt-3 text-gray-600 dark:text-gray-300">
            创新的三人联机游戏平台，随时随地和朋友一起玩！
          </p>
        </div>
      </header>
      
      <main class="container mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold mb-6 text-center">🎯 选择游戏模式</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
          <div class="card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer" onclick="selectMode('free')" role="button" tabindex="0" aria-label="自由模式">
            <div class="h-2 bg-gradient-to-r from-blue-500 to-blue-600"></div>
            <div class="p-6">
              <div class="w-16 h-16 rounded-full bg-gradient-to-r from-blue-500 to-blue-600 flex items-center justify-center mb-4 mx-auto">
                <i class="fas fa-gamepad text-3xl text-white"></i>
              </div>
              <h3 class="text-xl font-bold text-center mb-2">自由模式</h3>
              <p class="text-gray-600 text-center dark:text-gray-300">自由选择想玩的游戏</p>
            </div>
          </div>
          
          <div class="card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer" onclick="selectMode('challenge')" role="button" tabindex="0" aria-label="闯关模式">
            <div class="h-2 bg-gradient-to-r from-yellow-500 to-orange-500"></div>
            <div class="p-6">
              <div class="w-16 h-16 rounded-full bg-gradient-to-r from-yellow-500 to-orange-500 flex items-center justify-center mb-4 mx-auto">
                <i class="fas fa-trophy text-3xl text-white"></i>
              </div>
              <h3 class="text-xl font-bold text-center mb-2">闯关模式</h3>
              <p class="text-gray-600 text-center dark:text-gray-300">挑战4种类型，解锁成就</p>
            </div>
          </div>
          
          <div class="card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer" onclick="selectMode('random')" role="button" tabindex="0" aria-label="随机挑战">
            <div class="h-2 bg-gradient-to-r from-purple-500 to-pink-500"></div>
            <div class="p-6">
              <div class="w-16 h-16 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center mb-4 mx-auto">
                <i class="fas fa-dice text-3xl text-white"></i>
              </div>
              <h3 class="text-xl font-bold text-center mb-2">随机挑战</h3>
              <p class="text-gray-600 text-center dark:text-gray-300">紧张刺激的随机游戏</p>
            </div>
          </div>
          
          <div class="card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer" onclick="selectMode('tournament')" role="button" tabindex="0" aria-label="循环赛">
            <div class="h-2 bg-gradient-to-r from-green-500 to-teal-500"></div>
            <div class="p-6">
              <div class="w-16 h-16 rounded-full bg-gradient-to-r from-green-500 to-teal-500 flex items-center justify-center mb-4 mx-auto">
                <i class="fas fa-medal text-3xl text-white"></i>
              </div>
              <h3 class="text-xl font-bold text-center mb-2">循环赛</h3>
              <p class="text-gray-600 text-center dark:text-gray-300">积分累计，最终排名</p>
            </div>
          </div>
        </div>
        
        <div class="mt-8 text-center">
          <button onclick="toggleDarkMode()" class="px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg transition" aria-label="切换深色模式">
            <i class="fas fa-moon dark:hidden"></i>
            <i class="fas fa-sun hidden dark:block"></i>
          </button>
        </div>
      </main>
      
      <footer class="py-6 text-center text-sm text-gray-500">
        <p>支持手机、平板、电脑 📱💻🖥️</p>
        <p class="mt-2">© 2026 三人行游戏平台</p>
      </footer>
    </section>
    
    <section id="game-page" class="hidden flex-1">
      <header class="bg-white dark:bg-gray-800 shadow-md py-4 px-4">
        <div class="container mx-auto flex items-center justify-between">
          <button onclick="exitGame()" class="text-gray-600 dark:text-gray-300 hover:text-primary transition" aria-label="返回主页">
            <i class="fas fa-arrow-left text-xl"></i>
          </button>
          <h2 id="game-title" class="text-xl font-bold">游戏</h2>
          <div id="game-score" class="text-primary font-bold">0分</div>
        </div>
      </header>
      
      <main id="game-content" class="container mx-auto px-4 py-6">
      </main>
    </section>
  </div>
  
  <div id="modal-container"></div>
  
  <script>
    const AudioManager = {
      context: null,
      enabled: true,
      volume: 0.5,
      sounds: {
        click: { freq: 800, type: 'sine', duration: 0.1 },
        success: { freq: 523, type: 'sine', duration: 0.3 },
        error: { freq: 200, type: 'sawtooth', duration: 0.2 },
        countdown: { freq: 1000, type: 'square', duration: 0.1 },
        victory: { freq: 784, type: 'triangle', duration: 0.5 },
        tick: { freq: 600, type: 'triangle', duration: 0.05 },
        complete: { freq: 880, type: 'sine', duration: 0.4 }
      },
      
      init() {
        try {
          this.context = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
      },
      
      play(soundId) {
        if (!this.enabled || !this.context) return;
        
        const sound = this.sounds[soundId];
        if (!sound) return;
        
        const oscillator = this.context.createOscillator();
        const gainNode = this.context.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(this.context.destination);
        
        oscillator.type = sound.type;
        oscillator.frequency.setValueAtTime(sound.freq, this.context.currentTime);
        
        gainNode.gain.setValueAtTime(this.volume, this.context.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + sound.duration);
        
        oscillator.start();
        oscillator.stop(this.context.currentTime + sound.duration);
      },
      
      toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
      }
    };
    
    const GameEngine = {
      state: {
        mode: null,
        currentGame: null,
        players: [
          { id: 1, name: '玩家1', score: 0, avatar: 1 },
          { id: 2, name: '玩家2', score: 0, avatar: 2 },
          { id: 3, name: '玩家3', score: 0, avatar: 3 }
        ],
        currentRound: 0,
        totalRounds: 5,
        timer: 0,
        phase: 'waiting'
      },
      
      init() {
        this.loadSettings();
        this.setupEventListeners();
      },
      
      loadSettings() {
        const settings = localStorage.getItem('gameSettings');
        if (settings) {
          const parsed = JSON.parse(settings);
          if (parsed.darkMode) {
            document.body.classList.add('dark-mode');
          }
        }
      },
      
      setupEventListeners() {
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            if (document.getElementById('game-modal')) {
              closeModal();
            } else if (!document.getElementById('home-page').classList.contains('hidden')) {
            } else {
              this.exitCurrentScreen();
            }
          }
        });
        
        document.addEventListener('mousedown', () => {
          document.body.classList.remove('keyboard-nav');
        });
        
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            document.body.classList.add('keyboard-nav');
          }
        });
      },
      
      startGame(mode, gameId) {
        this.state.mode = mode;
        this.state.currentGame = gameId;
        this.state.phase = 'playing';
        this.showGameScreen();
        this.loadGame(gameId);
      },
      
      showGameScreen() {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('game-page').classList.remove('hidden');
      },
      
      loadGame(gameId) {
        const game = GameLibrary.get(gameId);
        if (game) {
          document.getElementById('game-title').textContent = game.name;
          const gameContent = document.getElementById('game-content');
          gameContent.innerHTML = game.render();
          game.init();
        }
      },
      
      exitCurrentScreen() {
        document.getElementById('game-page').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
      },
      
      updateScore(points) {
        this.state.players[0].score += points;
        document.getElementById('game-score').textContent = this.state.players[0].score + '分';
      }
    };
    
    const GameLibrary = {
      games: new Map(),
      
      register(id, game) {
        this.games.set(id, game);
      },
      
      get(id) {
        return this.games.get(id);
      },
      
      getAll() {
        return Array.from(this.games.values());
      }
    };
    
    function toggleDarkMode() {
      AudioManager.play('click');
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('gameSettings', JSON.stringify({ darkMode: isDark }));
    }
    
    function selectMode(modeId) {
      AudioManager.play('click');
      GameEngine.state.mode = modeId;
      
      const modeNames = {
        free: '自由模式 - 选择游戏',
        challenge: '闯关模式 - 按顺序挑战',
        random: '随机挑战 - 紧张刺激',
        tournament: '循环赛 - 积分累计'
      };
      
      const modal = document.createElement('div');
      modal.id = 'game-modal';
      modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">${modeNames[modeId]}</h2>
            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-300 text-2xl" aria-label="关闭">
              <i class="fas fa-times"></i>
            </button>
          </div>
          
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            ${renderGameList()}
          </div>
        </div>
      `;
      
      document.getElementById('modal-container').appendChild(modal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });
    }
    
    function renderGameList() {
      return GameLibrary.getAll().map(game => `
        <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-4 text-center cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 transition"
             onclick="startGame('${game.id}')" role="button" tabindex="0">
          <div class="w-16 h-16 rounded-full bg-gradient-to-r from-primary to-secondary flex items-center justify-center mx-auto mb-3">
            <i class="fas ${game.icon} text-2xl text-white"></i>
          </div>
          <h3 class="font-bold text-sm">${game.name}</h3>
        </div>
      `).join('');
    }
    
    function closeModal() {
      const modal = document.getElementById('game-modal');
      if (modal) modal.remove();
    }
    
    function startGame(gameId) {
      closeModal();
      GameEngine.startGame(GameEngine.state.mode, gameId);
    }
    
    function exitGame() {
      AudioManager.play('click');
      GameEngine.exitCurrentScreen();
    }
    
    GameLibrary.register('draw-guess', {
      id: 'draw-guess',
      name: '你画我猜',
      icon: 'fa-palette',
      category: 'collaboration',
      maxPlayers: 3,
      duration: 60,
      
      canvas: null,
      ctx: null,
      currentPlayer: 1,
      phase: 'draw',
      currentWord: '',
      
      words: ['猫', '狗', '太阳', '月亮', '星星', '房子', '汽车', '飞机', '树', '花', '山', '水', '火', '风', '雨', '彩虹', '小鸟', '书本', '桌子', '手机'],
      
      render() {
        return `
          <div class="max-w-4xl mx-auto">
            <div class="text-center mb-4">
              <div class="inline-block px-4 py-2 bg-primary text-white rounded-full">
                <span id="phase-text">玩家1绘画中...</span>
              </div>
              <div id="timer" class="mt-2 text-3xl font-bold text-danger">60</div>
            </div>
            
            <div id="word-display" class="text-center mb-4 p-4 bg-success text-white rounded-lg shadow">
              关键词：<span id="current-word" class="text-2xl font-bold"></span>
            </div>
            
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 mb-4">
              <canvas id="draw-canvas" class="w-full h-64 md:h-96 border-2 border-gray-300 rounded-lg touch-none bg-white"></canvas>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-center mb-4">
              <button onclick="Game.draw.setColor('#000000')" class="w-10 h-10 rounded-full bg-black border-2 border-gray-300"></button>
              <button onclick="Game.draw.setColor('#EF4444')" class="w-10 h-10 rounded-full bg-red-500 border-2"></button>
              <button onclick="Game.draw.setColor('#3B82F6')" class="w-10 h-10 rounded-full bg-blue-500 border-2"></button>
              <button onclick="Game.draw.setColor('#10B981')" class="w-10 h-10 rounded-full bg-green-500 border-2"></button>
              <button onclick="Game.draw.setColor('#F59E0B')" class="w-10 h-10 rounded-full bg-yellow-500 border-2"></button>
              <button onclick="Game.draw.setColor('#FFFFFF')" class="w-10 h-10 rounded-full bg-white border-2">🧹</button>
              <button onclick="Game.draw.setBrushSize(2)" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded">细</button>
              <button onclick="Game.draw.setBrushSize(5)" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded">中</button>
              <button onclick="Game.draw.setBrushSize(10)" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded">粗</button>
              <button onclick="Game.draw.clear()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">清除</button>
            </div>
            
            <div id="guess-section" class="hidden text-center">
              <input type="text" id="guess-input" placeholder="请输入你的猜测" 
                     class="px-4 py-3 border-2 rounded-lg text-lg w-full max-w-md dark:bg-gray-800 dark:border-gray-600">
              <button onclick="Game.draw.submitGuess()" 
                      class="mt-4 px-8 py-3 bg-primary text-white rounded-lg text-lg hover:bg-primary/90 transition">
                提交答案
              </button>
            </div>
            
            <div class="text-center mt-4">
              <button onclick="Game.draw.nextPhase()" id="next-phase-btn"
                      class="px-6 py-3 bg-success text-white rounded-lg">
                完成绘画 → 轮到玩家2
              </button>
            </div>
          </div>
        `;
      },
      
      init() {
        this.currentWord = this.words[Math.floor(Math.random() * this.words.length)];
        document.getElementById('current-word').textContent = this.currentWord;
        this.setupCanvas();
        this.startTimer();
      },
      
      setupCanvas() {
        this.canvas = document.getElementById('draw-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        const rect = this.canvas.getBoundingClientRect();
        this.canvas.width = rect.width * 2;
        this.canvas.height = rect.height * 2;
        this.ctx.scale(2, 2);
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.ctx.strokeStyle = '#000000';
        this.ctx.lineWidth = 5;
        
        this.isDrawing = false;
        this.lastX = 0;
        this.lastY = 0;
        
        const getPos = (e) => {
          const rect = this.canvas.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          return { x: clientX - rect.left, y: clientY - rect.top };
        };
        
        this.canvas.addEventListener('mousedown', (e) => {
          if (this.phase !== 'draw') return;
          this.isDrawing = true;
          const pos = getPos(e);
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('mousemove', (e) => {
          if (!this.isDrawing || this.phase !== 'draw') return;
          const pos = getPos(e);
          this.ctx.beginPath();
          this.ctx.moveTo(this.lastX, this.lastY);
          this.ctx.lineTo(pos.x, pos.y);
          this.ctx.stroke();
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('mouseup', () => this.isDrawing = false);
        this.canvas.addEventListener('mouseout', () => this.isDrawing = false);
        
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          if (this.phase !== 'draw') return;
          this.isDrawing = true;
          const pos = getPos(e);
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (!this.isDrawing || this.phase !== 'draw') return;
          const pos = getPos(e);
          this.ctx.beginPath();
          this.ctx.moveTo(this.lastX, this.lastY);
          this.ctx.lineTo(pos.x, pos.y);
          this.ctx.stroke();
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('touchend', () => this.isDrawing = false);
      },
      
      setColor(color) {
        this.ctx.strokeStyle = color;
        if (color === '#FFFFFF') {
          this.ctx.lineWidth = 20;
        } else {
          this.ctx.lineWidth = 5;
        }
      },
      
      setBrushSize(size) {
        this.ctx.lineWidth = size;
      },
      
      clear() {
        this.ctx.fillStyle = 'white';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
      },
      
      startTimer() {
        let time = 60;
        const timerEl = document.getElementById('timer');
        
        this.timerInterval = setInterval(() => {
          time--;
          timerEl.textContent = time;
          
          if (time <= 10) {
            AudioManager.play('tick');
          }
          
          if (time <= 0) {
            clearInterval(this.timerInterval);
            AudioManager.play('complete');
            this.nextPhase();
          }
        }, 1000);
      },
      
      nextPhase() {
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
        }
        
        this.currentPlayer++;
        
        if (this.currentPlayer === 2) {
          this.phase = 'draw';
          document.getElementById('phase-text').textContent = '玩家2绘画中...';
          document.getElementById('guess-section').classList.add('hidden');
          document.getElementById('next-phase-btn').classList.remove('hidden');
          document.getElementById('next-phase-btn').textContent = '完成绘画 → 轮到玩家3';
          this.clear();
          this.startTimer();
        } else if (this.currentPlayer === 3) {
          this.phase = 'draw';
          document.getElementById('phase-text').textContent = '玩家3绘画中...';
          document.getElementById('guess-section').classList.add('hidden');
          document.getElementById('next-phase-btn').classList.remove('hidden');
          document.getElementById('next-phase-btn').textContent = '完成绘画 → 猜答案';
          this.clear();
          this.startTimer();

          document.getElementById('phase-text').textContent = '玩家3猜答案！';
          document.getElementById('guess-section').classList.remove('hidden');
          document.getElementById('next-phase-btn').classList.add('hidden');
          document.getElementById('word-display').classList.add('hidden');

          this.phase = 'ready';
          gameArea.className = 'bg-yellow-100 dark:bg-yellow-900 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer';

      },
      
      resetRound() {
        const gameArea = document.getElementById('game-area');
        const statusText = document.getElementById('status-text');
        document.getElementById('round-num').textContent = Math.min(this.round + 1, this.maxRounds);
        
        this.phase = 'waiting';
        gameArea.className = 'bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer';
        statusText.textContent = '点击开始测试';
        statusText.className = 'text-4xl font-bold';
      },
      
      updateStats() {
        const bestEl = document.getElementById('best-time');
        const avgEl = document.getElementById('avg-time');
        const scoreEl = document.getElementById('current-score');
        
        bestEl.textContent = this.bestTime === Infinity ? '--' : `${this.bestTime}ms`;
        avgEl.textContent = this.round > 0 ? `${Math.round(this.totalTime / this.round)}ms` : '--';
        scoreEl.textContent = this.currentScore;
      },
      
      reset() {
        this.init();
        this.updateStats();
      },
      
      end() {
        const avg = Math.round(this.totalTime / this.round);
        AudioManager.play('victory');
        alert(`🎊 反应挑战结束！\n\n最佳反应：${this.bestTime}ms\n平均反应：${avg}ms\n总得分：${this.currentScore}分\n\n${this.bestTime < 200 ? '惊人！你是闪电侠！⚡' : this.bestTime < 300 ? '反应很快！👍' : '继续练习！💪'}`);
        GameEngine.updateScore(this.currentScore);
        GameEngine.exitCurrentScreen();
      }
    });
    
    GameLibrary.register('memory', {
      id: 'memory',
      name: '记忆挑战',
      icon: 'fa-memory',
      category: 'mixed',
      maxPlayers: 3,
      duration: 30,
      
      items: ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑', '🥭', '🍍'],
      sequence: [],
      playerSequence: [],
      level: 1,
      maxLevel: 5,
      isShowing: false,
      
      render() {
        return `
          <div class="max-w-2xl mx-auto text-center">
            <div class="mb-6">
              <div class="inline-block px-6 py-3 bg-purple-500 text-white rounded-full text-xl">
                等级 <span id="level-num">1</span> / <span id="max-levels">5</span>
              </div>
            </div>
            
            <div id="sequence-display" class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 mb-6 min-h-[200px] flex items-center justify-center">
              <div id="sequence-text" class="text-6xl flex gap-4 flex-wrap justify-center">
              </div>
            </div>
            
            <div class="mb-6">
              <p id="status-text" class="text-xl text-gray-600 dark:text-gray-300">准备显示序列...</p>
            </div>
            
            <div id="input-grid" class="grid grid-cols-5 gap-3 max-w-md mx-auto mb-6">
              ${this.items.slice(0, 10).map((item, i) => `
                <button onclick="Game.memory.selectItem(${i})" 
                        class="aspect-square text-4xl bg-gray-100 dark:bg-gray-700 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition text-2xl"
                        disabled>
                  ?
                </button>
              `).join('')}
            </div>
            
            <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow">
              <h3 class="text-xl font-bold mb-4">📊 统计</h3>
              <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                  <div class="text-sm text-gray-500">当前得分</div>
                  <div id="current-score" class="text-3xl font-bold text-primary">0</div>
                </div>
                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                  <div class="text-sm text-gray-500">序列长度</div>
                  <div id="sequence-length" class="text-3xl font-bold text-secondary">0</div>
                </div>
              </div>
            </div>
          </div>
        `;
      },
      
      init() {
        this.level = 1;
        this.currentScore = 0;
        document.getElementById('max-levels').textContent = this.maxLevel;
        this.startLevel();
      },
      
      startLevel() {
        const length = 2 + this.level;
        this.sequence = [];
        this.playerSequence = [];
        
        for (let i = 0; i < length; i++) {
          this.sequence.push(Math.floor(Math.random() * 10));
        }
        
        document.getElementById('level-num').textContent = this.level;
        document.getElementById('sequence-length').textContent = length;
        document.getElementById('current-score').textContent = this.currentScore;
        
        this.showSequence();
      },
      
      showSequence() {
        this.isShowing = true;
        const display = document.getElementById('sequence-text');
        const status = document.getElementById('status-text');
        const buttons = document.querySelectorAll('#input-grid button');
        
        buttons.forEach(btn => btn.disabled = true);
        status.textContent = '记住这个序列...';
        
        let index = 0;
        const showNext = () => {
          if (index > 0) {
            display.children[index - 1].classList.remove('animate-bounce');
          }
          
          if (index < this.sequence.length) {
            display.innerHTML = this.items[this.sequence[index]];
            display.children[0].classList.add('animate-bounce');
            AudioManager.play('tick');
            index++;
            setTimeout(showNext, 800);
          } else {
            display.innerHTML = '';
            status.textContent = '现在轮到你了！';
            this.isShowing = false;
            buttons.forEach(btn => btn.disabled = false);
          }
        };
        
        setTimeout(showNext, 500);
      },
      
      selectItem(index) {
        if (this.isShowing) return;
        
        this.playerSequence.push(index);
        const buttons = document.querySelectorAll('#input-grid button');
        
        buttons[index].classList.add('animate-bounce');
        AudioManager.play('click');
        
        setTimeout(() => {
          buttons[index].classList.remove('animate-bounce');
        }, 300);
        
        const currentIndex = this.playerSequence.length - 1;
        
        if (this.playerSequence[currentIndex] !== this.sequence[currentIndex]) {
          AudioManager.play('error');
          alert('❌ 错误！序列不对！');
          this.end();
          return;
        }
        
        if (this.playerSequence.length === this.sequence.length) {
          AudioManager.play('success');
          const points = this.level * 20;
          this.currentScore += points;
          document.getElementById('current-score').textContent = this.currentScore;
          
          if (this.level >= this.maxLevel) {
            alert(`🎉 太棒了！你完成了所有等级！+${points}分`);
            this.end();
          } else {
            alert(`✅ 正确！+${points}分`);
            this.level++;
            setTimeout(() => this.startLevel(), 1500);
          }
        }
      },
      
      end() {
        AudioManager.play('victory');
        alert(`🎊 记忆挑战结束！\n\n最终得分：${this.currentScore}分\n完成等级：${Math.min(this.level, this.maxLevel)}/${this.maxLevel}`);
        GameEngine.updateScore(this.currentScore);
        GameEngine.exitCurrentScreen();
      }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
      AudioManager.init();
      GameEngine.init();
      
      document.addEventListener('click', () => {
        if (AudioManager.context && AudioManager.context.state === 'suspended') {
          AudioManager.context.resume();
        }
      }, { once: true });
    });
  </script>
</body>
</html>
