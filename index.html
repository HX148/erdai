<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="聚友联机 - 多人联机游戏平台，支持多种游戏模式，随时随地和朋友一起玩！">
  <meta name="keywords" content="联机游戏, 多人游戏, 网页游戏, 休闲游戏">
  <meta name="author" content="聚友联机团队">
  <meta name="theme-color" content="#6366F1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <meta property="og:title" content="聚友联机 - 多人联机游戏平台">
  <meta property="og:description" content="多人联机游戏平台，随时随地和朋友一起玩！">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  
  <title>聚友联机 - 多人联机游戏平台</title>
  
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366F1',
            secondary: '#EC4899',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            background: '#FCF8EE',
            dark: '#0F0F0F'
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'bounce-in': 'bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)',
            'pulse-slow': 'pulse 2s infinite',
            'spin-slow': 'spin 3s linear infinite'
          }
        }
      }
    }
  </script>
  
  <style>
    :root {
      --primary: #6366F1;
      --secondary: #EC4899;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --background: #FCF8EE;
      --dark: #0F0F0F;
    }
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .dark body,
    body.dark-mode {
      background: var(--dark);
      color: white;
    }
    
    .dark-mode .card {
      background: #1a1a1a;
      border-color: #333;
    }
    
    .dark-mode .text-gray-600,
    .dark-mode .text-gray-700 {
      color: #ccc;
    }
    
    .dark-mode .bg-white {
      background-color: #1a1a1a;
    }
    
    .dark-mode .bg-gray-50 {
      background-color: #262626;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    
    .pet-container {
      animation: petFloat 3s ease-in-out infinite;
    }
    
    @keyframes petFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .pet-happy {
      animation: petHappy 0.5s ease-in-out;
    }
    
    @keyframes petHappy {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    @media (max-width: 768px) {
      .text-4xl {
        font-size: 2.5rem;
      }
      
      .text-3xl {
        font-size: 2rem;
      }
      
      button, .btn {
        min-height: 48px;
        touch-action: manipulation;
      }
      
      .p-6 {
        padding: 1rem;
      }
    }
    
    @media (min-width: 768px) and (max-width: 1024px) {
      .container {
        max-width: 90%;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    .keyboard-nav :focus {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
    }
    
    .room-card {
      transition: all 0.3s ease;
    }
    
    .room-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }
    
    .player-avatar {
      transition: all 0.3s ease;
    }
    
    .player-avatar:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen flex flex-col">
    <!-- 首页 -->
    <section id="home-page" class="flex-1 fade-in">
      <header class="py-6 px-4">
        <div class="container mx-auto text-center">

      </header>
      
      <main class="container mx-auto px-4 py-8">
        <!-- 联机房间系统 -->
        <div id="room-system" class="mb-8">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4 text-center">🏠 游戏房间</h2>
            
            <div id="room-login" class="text-center">
              <div class="mb-4">

                <button onclick="createRoom()" class="px-6 py-4 bg-primary text-white rounded-xl text-lg font-bold hover:bg-primary/90 transition">
                  <i class="fas fa-plus-circle mr-2"></i>创建房间
                </button>
                <button onclick="showJoinRoom()" class="px-6 py-4 bg-secondary text-white rounded-xl text-lg font-bold hover:bg-secondary/90 transition">
                  <i class="fas fa-sign-in-alt mr-2"></i>加入房间
                </button>
              </div>
            </div>
            
            <div id="join-room-form" class="hidden text-center mt-4">
              <input type="text" id="room-code" placeholder="输入房间号（6位数字）" 
                     class="px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-lg w-full max-w-md mb-4 dark:bg-gray-700">
              <div class="flex gap-4 justify-center">

            <div id="room-info" class="hidden mt-4">

                  <div>

        </div>

        <h2 class="text-2xl font-bold mb-6 text-center">🎯 选择游戏模式</h2>

    <!-- 游戏页面 -->
    <section id="game-page" class="hidden flex-1">
      <header class="bg-white dark:bg-gray-800 shadow-md py-4 px-4">
        <div class="container mx-auto flex items-center justify-between">
          <button onclick="exitGame()" class="text-gray-600 dark:text-gray-300 hover:text-primary transition" aria-label="返回主页">
            <i class="fas fa-arrow-left text-xl"></i>
          </button>
          <h2 id="game-title" class="text-xl font-bold">游戏</h2>
          <div id="game-score" class="text-primary font-bold">0分</div>

  <div id="modal-container"></div>
  
  <script>
    // ==================== 音效管理系统 ====================
    const AudioManager = {
      context: null,
      enabled: true,
      volume: 0.5,
      sounds: {
        click: { freq: 800, type: 'sine', duration: 0.1 },
        success: { freq: 523, type: 'sine', duration: 0.3 },
        error: { freq: 200, type: 'sawtooth', duration: 0.2 },
        countdown: { freq: 1000, type: 'square', duration: 0.1 },
        victory: { freq: 784, type: 'triangle', duration: 0.5 },
        tick: { freq: 600, type: 'triangle', duration: 0.05 },
        complete: { freq: 880, type: 'sine', duration: 0.4 }
      },
      
      init() {
        try {
          this.context = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
      },
      
      play(soundId) {
        if (!this.enabled || !this.context) return;
        
        const sound = this.sounds[soundId];
        if (!sound) return;
        
        const oscillator = this.context.createOscillator();
        const gainNode = this.context.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(this.context.destination);
        
        oscillator.type = sound.type;
        oscillator.frequency.setValueAtTime(sound.freq, this.context.currentTime);
        
        gainNode.gain.setValueAtTime(this.volume, this.context.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + sound.duration);
        
        oscillator.start();
        oscillator.stop(this.context.currentTime + sound.duration);
      },
      
      toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
      }
    };
    
    // ==================== 游戏引擎 ====================
    const GameEngine = {
      state: {
        mode: null,
        currentGame: null,
        players: [
          { id: 1, name: '玩家1', score: 0, avatar: 1, isHost: true },
          { id: 2, name: '玩家2', score: 0, avatar: 2, isHost: false },
          { id: 3, name: '玩家3', score: 0, avatar: 3, isHost: false }
        ],
        currentRound: 0,
        totalRounds: 5,
        timer: 0,
        phase: 'waiting'
      },
      
      init() {
        this.loadSettings();
        this.setupEventListeners();
      },
      
      loadSettings() {
        const settings = localStorage.getItem('gameSettings');
        if (settings) {
          const parsed = JSON.parse(settings);
          if (parsed.darkMode) {
            document.body.classList.add('dark-mode');
          }
        }
      },
      
      setupEventListeners() {
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            if (document.getElementById('game-modal')) {
              closeModal();
            } else if (!document.getElementById('home-page').classList.contains('hidden')) {
            } else {
              this.exitCurrentScreen();
            }
          }
        });
        
        document.addEventListener('mousedown', () => {
          document.body.classList.remove('keyboard-nav');
        });
        
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            document.body.classList.add('keyboard-nav');
          }
        });
      },
      
      startGame(mode, gameId) {
        this.state.mode = mode;
        this.state.currentGame = gameId;
        this.state.phase = 'playing';
        this.showGameScreen();
        this.loadGame(gameId);
      },
      
      showGameScreen() {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('game-page').classList.remove('hidden');
      },
      
      loadGame(gameId) {
        const game = GameLibrary.get(gameId);
        if (game) {
          document.getElementById('game-title').textContent = game.name;
          const gameContent = document.getElementById('game-content');
          gameContent.innerHTML = game.render();
          game.init();
        }
      },
      
      exitCurrentScreen() {
        document.getElementById('game-page').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
      },
      
      updateScore(points) {
        this.state.players[0].score += points;
        document.getElementById('game-score').textContent = this.state.players[0].score + '分';
      }
    };
    
    // ==================== 游戏库 ====================
    const GameLibrary = {
      games: new Map(),
      
      register(id, game) {
        this.games.set(id, game);
      },
      
      get(id) {
        return this.games.get(id);
      },
      
      getAll() {
        return Array.from(this.games.values());
      }
    };
    
    // ==================== 房间系统 ====================
    const RoomSystem = {
      currentRoom: null,
      playerName: '',
      isHost: false,
      
      generateRoomCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
      },
      
      createRoom(playerName) {
        this.playerName = playerName;
        this.isHost = true;
        this.currentRoom = {
          code: this.generateRoomCode(),
          players: [{ name: playerName, isHost: true, id: 1 }],
          status: 'waiting'
        };
        this.updateRoomUI();
        return this.currentRoom;
      },
      
      joinRoom(roomCode, playerName) {
        this.playerName = playerName;
        this.isHost = false;
        this.currentRoom = {
          code: roomCode,
          players: [
            { name: '房主', isHost: true, id: 1 },
            { name: playerName, isHost: false, id: 2 }
          ],
          status: 'waiting'
        };
        this.updateRoomUI();
        return this.currentRoom;
      },
      
      leaveRoom() {
        this.currentRoom = null;
        this.isHost = false;
        this.updateRoomUI();
      },
      
      updateRoomUI() {
        const roomLogin = document.getElementById('room-login');
        const joinRoomForm = document.getElementById('join-room-form');
        const roomInfo = document.getElementById('room-info');
        
        if (this.currentRoom) {
          roomLogin.classList.add('hidden');
          joinRoomForm.classList.add('hidden');
          roomInfo.classList.remove('hidden');
          
          document.getElementById('current-room-code').textContent = this.currentRoom.code;
          
          const playersList = document.getElementById('players-list');
          playersList.innerHTML = this.currentRoom.players.map((player, index) => `
            <div class="player-avatar flex flex-col items-center">
              <div class="w-12 h-12 rounded-full bg-gradient-to-r from-primary to-secondary flex items-center justify-center text-white text-xl font-bold">
                ${player.name.charAt(0)}
              </div>
              <span class="text-sm mt-1 ${player.isHost ? 'text-primary font-bold' : ''}">${player.name} ${player.isHost ? '(房主)' : ''}</span>
            </div>
          `).join('');
          
          const startBtn = document.getElementById('start-game-btn');
          const waitingText = document.getElementById('waiting-text');
          
          if (this.isHost) {
            startBtn.disabled = false;
            startBtn.classList.remove('hidden');
            waitingText.classList.add('hidden');
          } else {
            startBtn.classList.add('hidden');
            waitingText.classList.remove('hidden');
            waitingText.textContent = '等待房主开始游戏...';
          }
        } else {
          roomLogin.classList.remove('hidden');
          joinRoomForm.classList.add('hidden');
          roomInfo.classList.add('hidden');
        }
      }
    };
    
    // ==================== 宠物系统 ====================
    const PetSystem = {
      happiness: 50,
      pets: ['🐱', '🐶', '🐰', '🐼', '🦊', '🐨', '🐯', '🦁'],
      currentPet: 0,
      
      init() {
        this.currentPet = Math.floor(Math.random() * this.pets.length);
        this.updatePetDisplay();
      },
      
      updatePetDisplay() {
        const petContainer = document.getElementById('pet-container');
        if (petContainer) {
          petContainer.querySelector('.text-8xl').textContent = this.pets[this.currentPet];
        }
        const happinessValue = document.getElementById('happiness-value');
        if (happinessValue) {
          happinessValue.textContent = this.happiness;
        }
      },
      
      interact() {
        this.happiness = Math.min(100, this.happiness + 5);
        AudioManager.play('success');
        this.updatePetDisplay();
        
        const petContainer = document.getElementById('pet-container');
        if (petContainer) {
          petContainer.classList.add('pet-happy');
          setTimeout(() => {
            petContainer.classList.remove('pet-happy');
          }, 500);
        }
        
        if (this.happiness >= 100) {
          setTimeout(() => {
            alert('🎉 宠物超级开心！它决定给你一个惊喜！');
            this.happiness = 50;
            this.currentPet = Math.floor(Math.random() * this.pets.length);
            this.updatePetDisplay();
          }, 600);
        }
      }
    };
    
    // ==================== 全局函数 ====================

      init() {

        this.setupCanvas();
        this.startTimer();
      },
      
      setupCanvas() {
        this.canvas = document.getElementById('draw-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        const rect = this.canvas.getBoundingClientRect();
        this.canvas.width = rect.width * 2;
        this.canvas.height = rect.height * 2;
        this.ctx.scale(2, 2);
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.ctx.strokeStyle = '#000000';
        this.ctx.lineWidth = 5;
        
        this.isDrawing = false;
        this.lastX = 0;
        this.lastY = 0;
        
        const getPos = (e) => {
          const rect = this.canvas.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          return { x: clientX - rect.left, y: clientY - rect.top };
        };
        
        this.canvas.addEventListener('mousedown', (e) => {
          if (this.phase !== 'draw') return;
          this.isDrawing = true;
          const pos = getPos(e);
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('mousemove', (e) => {
          if (!this.isDrawing || this.phase !== 'draw') return;
          const pos = getPos(e);
          this.ctx.beginPath();
          this.ctx.moveTo(this.lastX, this.lastY);
          this.ctx.lineTo(pos.x, pos.y);
          this.ctx.stroke();
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('mouseup', () => this.isDrawing = false);
        this.canvas.addEventListener('mouseout', () => this.isDrawing = false);
        
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          if (this.phase !== 'draw') return;
          this.isDrawing = true;
          const pos = getPos(e);
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (!this.isDrawing || this.phase !== 'draw') return;
          const pos = getPos(e);
          this.ctx.beginPath();
          this.ctx.moveTo(this.lastX, this.lastY);
          this.ctx.lineTo(pos.x, pos.y);
          this.ctx.stroke();
          this.lastX = pos.x;
          this.lastY = pos.y;
        });
        
        this.canvas.addEventListener('touchend', () => this.isDrawing = false);
      },
      
      setColor(color) {
        this.ctx.strokeStyle = color;
        if (color === '#FFFFFF') {
          this.ctx.lineWidth = 20;
        } else {
          this.ctx.lineWidth = 5;
        }
      },
      
      setBrushSize(size) {
        this.ctx.lineWidth = size;
      },
      
      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.fillStyle = 'white';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

      startTimer() {
        let time = 60;
        const timerEl = document.getElementById('timer');
        
        this.timerInterval = setInterval(() => {
          time--;
          timerEl.textContent = time;
          
          if (time <= 10) {
            AudioManager.play('tick');
          }
          
          if (time <= 0) {
            clearInterval(this.timerInterval);
            AudioManager.play('complete');
            this.nextPhase();
          }
        }, 1000);

      nextPhase() {
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
        }
        
        this.currentPlayer++;

          document.getElementById('phase-text').textContent = '玩家2绘画中...';

          this.clear();
          this.startTimer();

          document.getElementById('guess-section').classList.add('hidden');

                </div>
                <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">

      init() {
        this.round = 0;

        document.getElementById('game-area').onclick = () => this.handleClick();
      },
      
      handleClick() {
        const gameArea = document.getElementById('game-area');
        const statusText = document.getElementById('status-text');
        
        if (this.phase === 'waiting') {
          AudioManager.play('countdown');
          this.phase = 'ready';
          gameArea.className = 'bg-yellow-100 dark:bg-yellow-900 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer select-none';
          statusText.textContent = '准备...';
          statusText.className = 'text-4xl font-bold text-yellow-600';
          
          this.waitTime = 1000 + Math.random() * 3000;
          this.waitTimeout = setTimeout(() => this.showGo(), this.waitTime);
        } else if (this.phase === 'ready') {
          clearTimeout(this.waitTimeout);
          AudioManager.play('error');
          gameArea.className = 'bg-red-100 dark:bg-red-900 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer select-none';
          statusText.textContent = '太早了！等待绿色...';
          statusText.className = 'text-4xl font-bold text-red-600';
          
          setTimeout(() => this.resetRound(), 1000);
        } else if (this.phase === 'go') {
          const reactionTime = Date.now() - this.startTime;
          
          if (reactionTime < this.bestTime) {
            this.bestTime = reactionTime;
          }
          this.totalTime += reactionTime;
          this.round++;
          
          const points = reactionTime < 200 ? 30 : reactionTime < 300 ? 20 : reactionTime < 400 ? 10 : 5;
          this.currentScore += points;
          
          AudioManager.play('success');
          gameArea.className = 'bg-green-100 dark:bg-green-900 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer select-none';
          statusText.textContent = `${reactionTime}ms！+${points}分`;
          statusText.className = 'text-4xl font-bold text-green-600';
          
          this.updateStats();
          
          if (this.round >= this.maxRounds) {
            setTimeout(() => this.end(), 1500);
          } else {
            setTimeout(() => this.resetRound(), 1500);
          }
        }
      },
      
      showGo() {
        const gameArea = document.getElementById('game-area');
        const statusText = document.getElementById('status-text');
        
        this.phase = 'go';
        this.startTime = Date.now();
        
        gameArea.className = 'bg-green-100 dark:bg-green-900 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer select-none';
        statusText.textContent = '点击！';
        statusText.className = 'text-6xl font-bold text-green-600 animate-pulse';
        
        AudioManager.play('success');
      },
      
      resetRound() {
        const gameArea = document.getElementById('game-area');
        const statusText = document.getElementById('status-text');
        document.getElementById('round-num').textContent = Math.min(this.round + 1, this.maxRounds);
        
        this.phase = 'waiting';
        gameArea.className = 'bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-12 mb-6 min-h-[300px] flex items-center justify-center cursor-pointer select-none';
        statusText.textContent = '点击开始测试';
        statusText.className = 'text-4xl font-bold';
      },
      
      updateStats() {
        const bestEl = document.getElementById('best-time');
        const avgEl = document.getElementById('avg-time');
        const scoreEl = document.getElementById('current-score');
        
        bestEl.textContent = this.bestTime === Infinity ? '--' : `${this.bestTime}ms`;
        avgEl.textContent = this.round > 0 ? `${Math.round(this.totalTime / this.round)}ms` : '--';
        scoreEl.textContent = this.currentScore;
      },
      
      reset() {
        this.init();
        this.updateStats();
      },
      
      end() {
        const avg = Math.round(this.totalTime / this.round);
        AudioManager.play('victory');
        alert(`🎊 反应挑战结束！\n\n最佳反应：${this.bestTime}ms\n平均反应：${avg}ms\n总得分：${this.currentScore}分\n\n${this.bestTime < 200 ? '惊人！你是闪电侠！⚡' : this.bestTime < 300 ? '反应很快！👍' : '继续练习！💪'}`);
        GameEngine.updateScore(this.currentScore);
        GameEngine.exitCurrentScreen();
      }
    });

        let index = 0;
        const showNext = () => {
          if (index > 0) {
            display.children[index - 1].classList.remove('animate-bounce');

          if (index < this.sequence.length) {
            display.innerHTML = this.items[this.sequence[index]];
            display.children[0].classList.add('animate-bounce');

            setTimeout(showNext, 800);

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 mb-6">
              <div class="mb-4 flex justify-between items-center">
                <span class="inline-block px-3 py-1 bg-warning text-white rounded-full text-sm">难度：⭐⭐⭐⭐</span>
                <button onclick="Game.logic.showHint()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-sm hover:bg-gray-300 transition">
                  💡 提示
                </button>
              </div>
              
              <div id="hint-text" class="hidden mb-4 p-4 bg-yellow-50 dark:bg-yellow-900/30 rounded-lg text-yellow-800 dark:text-yellow-200"></div>
              
              <pre id="puzzle-text" class="text-lg whitespace-pre-wrap font-sans mb-8 bg-gray-50 dark:bg-gray-700 p-4 rounded-lg"></pre>
              
              <div id="answer-section" class="text-center">
                <input type="text" id="answer-input" 
                       class="px-6 py-4 border-2 border-primary rounded-xl text-xl w-full max-w-lg dark:bg-gray-700 dark:border-gray-600"
                       placeholder="输入你的答案...">
                <button onclick="Game.logic.submitAnswer()" 
                        class="mt-4 px-8 py-4 bg-primary text-white rounded-xl text-xl hover:bg-primary/90 transition">
                  提交答案
                </button>
              </div>
            </div>
            
            <div id="feedback" class="hidden text-center mb-6">
              <div id="feedback-text" class="text-2xl font-bold p-4 rounded-lg"></div>
            </div>
            
            <div class="text-center mt-6">
              <button onclick="Game.logic.nextPuzzle()" id="next-btn" 
                      class="hidden px-8 py-4 bg-success text-white rounded-xl text-xl">
                下一题 →
              </button>
            </div>
          </div>
        `;
      },
      
      init() {
        document.getElementById('total-puzzles').textContent = this.puzzles.length;
        this.showPuzzle();
      },
      
      showPuzzle() {
        const puzzle = this.puzzles[this.currentPuzzle];
        document.getElementById('puzzle-num').textContent = this.currentPuzzle + 1;
        document.getElementById('puzzle-text').textContent = puzzle.q;
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').disabled = false;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('hint-text').classList.add('hidden');
        this.canAnswer = true;
      },
      
      showHint() {
        const puzzle = this.puzzles[this.currentPuzzle];
        const hintText = document.getElementById('hint-text');
        hintText.textContent = `💡 提示：${puzzle.hint}`;
        hintText.classList.remove('hidden');
      },
      
      submitAnswer() {
        if (!this.canAnswer) return;
        
        const input = document.getElementById('answer-input');
        const answer = input.value.trim().toLowerCase();
        const correct = this.puzzles[this.currentPuzzle].a.some(a => 
          a.toLowerCase() === answer
        );
        
        this.canAnswer = false;
        input.disabled = true;
        
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        
        if (correct) {
          AudioManager.play('success');
          feedbackText.textContent = '🎉 正确！+30分';
          feedbackText.className = 'text-2xl font-bold p-4 rounded-lg bg-green-100 text-green-800';
          GameEngine.updateScore(30);
        } else {
          AudioManager.play('error');
          feedbackText.textContent = '❌ 错误！-15分';
          feedbackText.className = 'text-2xl font-bold p-4 rounded-lg bg-red-100 text-red-800';
          GameEngine.updateScore(-15);
        }
        
        feedback.classList.remove('hidden');
        
        if (this.currentPuzzle < this.puzzles.length - 1) {
          document.getElementById('next-btn').classList.remove('hidden');
        } else {
          setTimeout(() => this.end(), 1500);
        }
      },
      
      nextPuzzle() {
        this.currentPuzzle++;
        this.showPuzzle();
      },
      
      end() {
        const score = GameEngine.state.players[0].score;
        AudioManager.play('victory');
        alert(`🏆 逻辑推理结束！\n\n你的最终得分：${score}分\n\n${score >= 60 ? '太厉害了！逻辑大师！🧠' : score >= 30 ? '做得不错！👍' : '继续加油！💪'}`);
        GameEngine.exitCurrentScreen();
      }
    });
    
    // 8. 新游戏：诗词飞花令（适合初中生）
    GameLibrary.register('poetry-game', {
      id: 'poetry-game',
      name: '诗词飞花令',
      icon: 'fa-feather-alt',
      category: 'creative',
      maxPlayers: 3,
      duration: 60,
      
      keywords: ['春', '花', '月', '风', '雨', '山', '水', '云', '雪', '夜'],
      currentKeyword: '',
      usedPoems: [],
      currentPlayer: 0,
      round: 0,
      maxRounds: 5,
      
      poems: {
        '春': ['春眠不觉晓', '春风又绿江南岸', '春色满园关不住', '春江水暖鸭先知'],
        '花': ['花开堪折直须折', '花间一壶酒', '花落知多少', '花重锦官城'],
        '月': ['月落乌啼霜满天', '月出惊山鸟', '月是故乡明', '月上柳梢头'],
        '风': ['风吹草低见牛羊', '风雨送春归', '风急天高猿啸哀', '风雪夜归人'],
        '雨': ['雨打梨花深闭门', '雨过天青云破处', '雨中黄叶树', '雨歇南山积翠来'],
        '山': ['山重水复疑无路', '山外青山楼外楼', '山寺桃花始盛开', '山气日夕佳'],
        '水': ['水光潋滟晴方好', '水村山郭酒旗风', '水流心不竞', '水深波浪阔'],
        '云': ['云深不知处', '云想衣裳花想容', '云横秦岭家何在', '云淡风轻近午天'],
        '雪': ['雪拥蓝关马不前', '雪尽马蹄轻', '雪暗凋旗画', '雪却输梅一段香'],
        '夜': ['夜来风雨声', '夜半钟声到客船', '夜阑卧听风吹雨', '夜深千帐灯']
      },
      
      render() {
        return `
          <div class="max-w-4xl mx-auto">
            <div class="text-center mb-6">
              <div class="inline-block px-6 py-3 bg-primary text-white rounded-full text-xl">
                第 <span id="round-num">1</span> / <span id="max-rounds">5</span> 轮
              </div>
            </div>
            
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 mb-6 text-center">
              <h3 class="text-lg text-gray-600 dark:text-gray-300 mb-4">本轮关键词：</h3>
              <div id="keyword-display" class="text-6xl font-bold text-primary mb-4"></div>
              <p class="text-gray-500">请说出包含这个字的诗句</p>
            </div>
            
            <div class="bg-white dark:bg-gray-800 rounded-xl p-6 mb-6">
              <h3 class="text-lg font-bold mb-4">已使用的诗句：</h3>
              <div id="used-poems" class="space-y-2"></div>
            </div>
            
            <div class="text-center">
              <div class="mb-4">
                <span class="text-lg">轮到 <span id="current-player-name" class="font-bold text-primary"></span></span>
              </div>
              <input type="text" id="poem-input" 
                     class="px-6 py-4 border-2 border-primary rounded-xl text-xl w-full max-w-lg dark:bg-gray-700 dark:border-gray-600"
                     placeholder="输入包含关键词的诗句...">
              <div class="mt-4 space-x-4">
                <button onclick="Game.poetry.submitPoem()" 
                        class="px-8 py-4 bg-primary text-white rounded-xl text-xl hover:bg-primary/90 transition">
                  提交诗句
                </button>
                <button onclick="Game.poetry.skipTurn()" 
                        class="px-6 py-4 bg-gray-200 dark:bg-gray-700 rounded-xl text-lg">
                  跳过
                </button>
              </div>
            </div>
          </div>
        `;
      },
      
      init() {
        this.round = 0;
        this.usedPoems = [];
        this.currentPlayer = 0;
        this.startRound();
      },
      
      startRound() {
        this.currentKeyword = this.keywords[Math.floor(Math.random() * this.keywords.length)];
        document.getElementById('keyword-display').textContent = this.currentKeyword;
        document.getElementById('round-num').textContent = this.round + 1;
        document.getElementById('max-rounds').textContent = this.maxRounds;
        document.getElementById('current-player-name').textContent = GameEngine.state.players[this.currentPlayer].name;
        document.getElementById('poem-input').value = '';
        this.updateUsedPoems();
      },
      
      updateUsedPoems() {
        const usedPoemsEl = document.getElementById('used-poems');
        if (this.usedPoems.length === 0) {
          usedPoemsEl.innerHTML = '<p class="text-gray-400">暂无</p>';
        } else {
          usedPoemsEl.innerHTML = this.usedPoems.map(poem => `
            <div class="p-2 bg-gray-50 dark:bg-gray-700 rounded">${poem}</div>
          `).join('');
        }
      },
      
      submitPoem() {
        const input = document.getElementById('poem-input');
        const poem = input.value.trim();
        
        if (!poem) {
          alert('请输入诗句！');
          return;
        }
        
        if (!poem.includes(this.currentKeyword)) {
          alert(`诗句中必须包含"${this.currentKeyword}"字！`);
          return;
        }
        
        if (this.usedPoems.includes(poem)) {
          alert('这句诗已经用过了！');
          return;
        }
        
        AudioManager.play('success');
        this.usedPoems.push(poem);
        GameEngine.updateScore(20);
        
        this.currentPlayer = (this.currentPlayer + 1) % 3;
        
        if (this.currentPlayer === 0) {
          this.round++;
          if (this.round >= this.maxRounds) {
            this.end();
            return;
          }
        }
        
        this.startRound();
      },
      
      skipTurn() {
        this.currentPlayer = (this.currentPlayer + 1) % 3;
        
        if (this.currentPlayer === 0) {
          this.round++;
          if (this.round >= this.maxRounds) {
            this.end();
            return;
          }
        }
        
        this.startRound();
      },
      
      end() {
        const score = GameEngine.state.players[0].score;
        AudioManager.play('victory');
        alert(`🎊 诗词飞花令结束！\n\n你的最终得分：${score}分\n\n${score >= 60 ? '太厉害了！诗词达人！📚' : score >= 40 ? '做得不错！👍' : '继续加油！💪'}`);
        GameEngine.exitCurrentScreen();
      }
    });
    
    // 全局游戏引用
    window.Game = {
      draw: GameLibrary.get('draw-guess'),
      trivia: GameLibrary.get('trivia'),
      story: GameLibrary.get('story-chain'),
      wheel: GameLibrary.get('fortune-wheel'),
      reaction: GameLibrary.get('reaction'),
      memory: GameLibrary.get('memory'),
      logic: GameLibrary.get('logic-puzzle'),
      poetry: GameLibrary.get('poetry-game')
    };
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      AudioManager.init();
      GameEngine.init();
      PetSystem.init();
      
      document.addEventListener('click', () => {
        if (AudioManager.context && AudioManager.context.state === 'suspended') {
          AudioManager.context.resume();
        }
      }, { once: true });
    });
  </script>
</body>
</html>
